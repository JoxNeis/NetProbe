<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetProbe — HTTP Tester</title>
  <link rel="stylesheet" href="assets/styles/app.css">
</head>
<body>

<div class="app">

  <!-- ═══ SIDEBAR ════════════════════════════════════════ -->
  <aside class="sidebar">

    <!-- Logo -->
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M2 8h12M8 3l5 5-5 5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <h1>NetProbe</h1>
        <span>HTTP toolkit</span>
      </div>
    </div>

    <!-- Projects section -->
    <div class="sidebar-section">
      <div class="sidebar-section-header">
        <span class="sidebar-section-title">Projects</span>
        <button class="btn-icon" onclick="App.openNewProject()" title="New project">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="sidebar-list" id="project-list"></div>
    </div>

    <div class="sidebar-divider"></div>

    <!-- Tasks section -->
    <div class="sidebar-section" id="tasks-section" style="display:none;flex:1;overflow:hidden;display:flex;flex-direction:column">
      <div class="sidebar-section-header">
        <span class="sidebar-section-title" id="tasks-project-name">Tasks</span>
        <button class="btn-icon" onclick="App.openNewTask()" title="New task">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="sidebar-tasks" id="task-list"></div>
    </div>

    <!-- Bottom shortcuts -->
    <div style="padding:10px 8px;border-top:1px solid var(--border);margin-top:auto">
      <div style="font-size:10px;color:var(--text-3);font-family:var(--font-mono);padding:0 6px">
        <div style="margin-bottom:4px">⌘ + Enter &nbsp; Send</div>
        <div>Esc &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Close modal</div>
      </div>
    </div>

  </aside>

  <!-- ═══ MAIN ═════════════════════════════════════════════ -->
  <main class="main">
    <div id="main-content" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
      <!-- dynamically rendered by app.js -->
    </div>
  </main>

</div>

<!-- ═══ NEW PROJECT MODAL ═══════════════════════════════ -->
<div class="modal-overlay" id="project-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">New project</span>
      <button class="btn-icon" onclick="App.closeNewProject()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 2l10 10M12 2l-10 10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Project name</label>
        <input class="form-input" id="proj-name-input" type="text" placeholder="My API project" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <input class="form-input" id="proj-desc-input" type="text" placeholder="Optional description">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="App.closeNewProject()">Cancel</button>
      <button class="btn-primary" onclick="App.submitNewProject()">Create project</button>
    </div>
  </div>
</div>

<!-- ═══ NEW TASK MODAL ════════════════════════════════════ -->
<div class="modal-overlay" id="task-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">New task</span>
      <button class="btn-icon" onclick="App.closeNewTask()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 2l10 10M12 2l-10 10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Task name</label>
        <input class="form-input" id="task-name-input" type="text" placeholder="Get user info" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">Method &amp; URL</label>
        <div class="flex gap-6">
          <select class="form-select" id="task-method-select" style="width:130px;flex-shrink:0">
            <option>GET</option>
            <option>POST</option>
            <option>PUT</option>
            <option>PATCH</option>
            <option>DELETE</option>
            <option>HEAD</option>
          </select>
          <input class="form-input" id="task-url-input" type="text" placeholder="https://api.example.com/path" style="font-family:var(--font-mono);font-size:12px">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Description (optional)</label>
        <input class="form-input" id="task-desc-input" type="text" placeholder="What does this task do?">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="App.closeNewTask()">Cancel</button>
      <button class="btn-primary" onclick="App.submitNewTask()">Create task</button>
    </div>
  </div>
</div>

<!-- ═══ TOAST ════════════════════════════════════════════ -->
<div class="toast" id="toast"></div>

<script src="assets/js/app.js"></script>
</body>
</html>
